---
- name: Security Hardening - Web Server
  hosts: webserver
  become: yes
  tasks:
    - name: Install UFW firewall
      apt:
        name: ufw
        state: present
        update_cache: yes
    - name: Set UFW default deny incoming
      ufw:
        default: deny
        direction: incoming
    - name: Set UFW default allow outgoing
      ufw:
        default: allow
        direction: outgoing
    - name: Allow SSH on web server
      ufw:
        rule: allow
        port: '22'
        proto: tcp
    - name: Allow HTTP on web server
      ufw:
        rule: allow
        port: '80'
        proto: tcp
    - name: Allow HTTPS on web server
      ufw:
        rule: allow
        port: '443'
        proto: tcp
    - name: Allow Node.js backend port
      ufw:
        rule: allow
        port: '3000'
        proto: tcp
    - name: Enable UFW
      ufw:
        state: enabled
    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
    - name: Disable SSH password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
    - name: Restart SSH service
      systemd:
        name: ssh
        state: restarted
    - name: Set correct permissions on SSH directory
      file:
        path: /home/ubuntu/.ssh
        mode: '0700'
        owner: ubuntu
        group: ubuntu
    - name: Set correct permissions on authorized_keys
      file:
        path: /home/ubuntu/.ssh/authorized_keys
        mode: '0600'
        owner: ubuntu
        group: ubuntu
- name: Security Hardening - Database Server
  hosts: dbserver
  become: yes
  tasks:
    - name: Install UFW firewall
      apt:
        name: ufw
        state: present
        update_cache: yes
    - name: Set UFW default deny incoming
      ufw:
        default: deny
        direction: incoming
    - name: Set UFW default allow outgoing
      ufw:
        default: allow
        direction: outgoing
    - name: Allow SSH only (from web server via bastion)
      ufw:
        rule: allow
        port: '22'
        proto: tcp
    - name: Allow MongoDB port only from private subnet
      ufw:
        rule: allow
        port: '27017'
        proto: tcp
        src: '10.0.1.0/24'
    - name: Enable UFW
      ufw:
        state: enabled
    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
    - name: Disable SSH password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
    - name: Restart SSH service
      systemd:
        name: ssh
        state: restarted
    - name: Disable MongoDB test database access
      shell: |
        mongosh --eval "
          use admin;
          db.auth('admin', 'AdminPass123!');
          db.dropDatabase();
        " || true
      ignore_errors: yes
